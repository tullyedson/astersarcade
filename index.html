<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aster's Arcade</title>
  <style>
    :root{--pink:#ff4fa3;--cyan:#52efff;--violet:#986cff;--gold:#ffc94d;--ink:#080711}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%}
    body{overflow-x:hidden;background:#11101a;color:#f7f2ff;font-family:"Trebuchet MS",Arial,sans-serif}
    .mall{position:relative;min-height:100vh;padding:8vh 4vw 0;background:
      linear-gradient(#c7bdad 0 7%,#9b9287 7% 9%,transparent 9%),
      radial-gradient(ellipse at 50% 8%,#fff9 0 5%,transparent 18%),
      linear-gradient(#47434d 0 13%,#24212a 13% 100%)}
    .ceiling{position:absolute;inset:0 0 auto;height:14%;opacity:.6;background:
      repeating-linear-gradient(90deg,transparent 0 11.8%,#15131a 12% 12.3%),
      repeating-linear-gradient(0deg,transparent 0 47%,#15131a 48% 51%)}
    .light{position:absolute;top:3.4%;width:8%;height:1.6%;background:#fffbe8;box-shadow:0 0 18px #fff}.l1{left:14%}.l2{left:46%}.l3{right:14%}
    .store{position:relative;z-index:2;width:min(1120px,96vw);margin:auto;padding:0 3% 5%;border:10px solid #17131d;border-bottom:0;background:#06050b;box-shadow:0 0 0 3px #665e69,0 0 70px #000}
    .fascia{position:relative;margin:-5.5vh -3% 0;min-height:142px;display:grid;place-items:center;border:8px solid #16121c;background:
      linear-gradient(110deg,#171227,#291d3e 48%,#171227);box-shadow:0 14px 22px #000,inset 0 0 35px #000}
    .fascia:before{content:"";position:absolute;inset:8px;border:2px solid #5d456e;background:repeating-linear-gradient(100deg,transparent 0 39px,#ffffff08 40px 42px)}
    .sign{position:relative;z-index:2;margin:0;text-align:center;font:900 clamp(38px,8vw,86px)/1 "Arial Black",Arial,sans-serif;font-style:italic;letter-spacing:.03em;color:#fff;
      text-shadow:0 0 3px #fff,0 0 8px var(--pink),0 0 18px var(--pink),4px 5px 0 #531559,-4px -3px 0 #105768;animation:buzz 8s steps(1) infinite}
    .sign small{display:block;margin-top:8px;font:700 clamp(9px,1.5vw,15px)/1 monospace;letter-spacing:.55em;color:var(--cyan);text-shadow:0 0 8px var(--cyan)}
    @keyframes buzz{0%,93%,95%,100%{opacity:1}94%{opacity:.55}}
    .entrance{position:relative;min-height:940px;padding:56px 5% 80px;overflow:hidden;background:
      radial-gradient(ellipse at 50% 25%,#3d2763 0,transparent 48%),
      linear-gradient(#0a0811,#030205 72%)}
    .entrance:before,.entrance:after{content:"";position:absolute;top:0;bottom:0;width:7%;background:linear-gradient(90deg,#111,#4b3e4e,#131015);border-inline:3px solid #777}
    .entrance:before{left:0}.entrance:after{right:0;transform:scaleX(-1)}
    .carpet{position:absolute;left:-10%;right:-10%;bottom:0;height:56%;transform:perspective(500px) rotateX(58deg);transform-origin:bottom;background-color:#120b25;background-image:
      radial-gradient(circle,#ff4fa3 0 2px,transparent 3px),radial-gradient(circle,#52efff 0 2px,transparent 3px),linear-gradient(45deg,transparent 45%,#8d4cff22 46% 54%,transparent 55%);background-size:47px 41px,61px 53px,70px 70px;box-shadow:inset 0 40px 80px #000}
    .machines{position:relative;z-index:2;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));align-items:end;gap:46px 28px;min-height:760px;perspective:900px;padding-inline:3%}
    .machine{position:relative;grid-column:span 2;width:100%;height:350px;padding:18px 13px 22px;border:7px solid #07070a;border-radius:24px 24px 8px 8px;background:linear-gradient(105deg,#151927,#3c4050 48%,#10121a);box-shadow:0 24px 35px #000,inset 0 0 25px #000;text-decoration:none;color:#fff;transition:transform .2s,filter .2s}
    .machine:nth-child(1),.machine:nth-child(4){transform:rotateY(4deg)}.machine:nth-child(3),.machine:nth-child(6){transform:rotateY(-4deg)}.machine:hover,.machine:focus{transform:translateY(-12px) rotateY(0);filter:brightness(1.2);outline:none}
    .machine:before,.machine:after{content:"";position:absolute;bottom:-20px;width:27%;height:24px;background:#090a0e;border:4px solid #242733;border-top:0}.machine:before{left:12%}.machine:after{right:12%}
    .cab-sign{display:grid;place-items:center;height:52px;margin:-8px -4px 12px;border:4px solid #08090c;background:#e8e1d5;color:#111;font:900 clamp(17px,2.4vw,28px)/1 "Arial Black";letter-spacing:.04em;text-align:center;text-shadow:2px 1px var(--pink),-2px -1px var(--cyan);box-shadow:0 0 15px #fff8}
    .machine.science .cab-sign{letter-spacing:.12em}.machine.neon .cab-sign{color:transparent;background:linear-gradient(120deg,#082341,#24134a);text-shadow:none;-webkit-text-stroke:1px #fff;box-shadow:0 0 18px #52efff88}
    .screen{position:relative;height:190px;padding:12px;border:8px solid #050608;border-radius:12%/5%;overflow:hidden;background:#06110b;box-shadow:inset 0 0 30px #000}
    .screen:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 3px,#0005 3px 4px);pointer-events:none}
    .science .screen{display:grid;place-items:center;text-align:center;color:#baff29;font:700 12px/1.6 monospace}.science .screen strong{display:block;color:#fff;font-size:18px}
    .blocks{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(12,1fr);gap:2px;height:100%;padding:8px}.blocks i{background:#111827}.blocks i:nth-child(7n+1),.blocks i:nth-child(13n+2){background:#22e5ff;box-shadow:0 0 7px #22e5ff}.blocks i:nth-child(11n+4){background:#c26bff}.blocks i:nth-child(17n+3){background:#ffd24a}
    .deck{height:48px;margin:12px -5px 0;border:5px solid #090a0c;background:linear-gradient(#4b515d,#14171d);transform:perspective(180px) rotateX(14deg);display:flex;align-items:center;justify-content:center;gap:20px}.stick{width:11px;height:31px;background:#aaa;border-radius:7px;position:relative}.stick:before{content:"";position:absolute;width:25px;height:25px;border-radius:50%;background:#e22652;left:-7px;top:-11px}.button{width:28px;height:18px;border-radius:50%;background:#42dff5;border:4px solid #111;box-shadow:0 4px #050505}.science .button{background:#ff315d}
    .star .screen{background:radial-gradient(circle at 30% 22%,#fff 0 1px,transparent 2px),radial-gradient(circle at 70% 70%,#8ef 0 1px,transparent 2px),#030713;background-size:34px 39px,57px 51px}.ship{position:absolute;left:45%;top:42%;width:0;height:0;border-top:13px solid transparent;border-bottom:13px solid transparent;border-left:30px solid #fff;filter:drop-shadow(0 0 7px var(--cyan));transform:rotate(-20deg)}.rock{position:absolute;width:42px;height:37px;border:2px solid #fff;border-radius:43% 57% 62% 38%;filter:drop-shadow(0 0 5px var(--pink))}.rock.r1{left:18%;top:21%}.rock.r2{right:14%;bottom:18%;transform:scale(.7)}
    .breaker .screen{display:grid;place-items:center;background:#12051b}.brick-wall{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:88%;height:58%;align-content:start}.brick-wall i{height:13px;background:var(--cyan);box-shadow:0 0 5px var(--cyan)}.brick-wall i:nth-child(3n){background:var(--pink);box-shadow:0 0 5px var(--pink)}.brick-wall i:nth-child(4n){background:var(--gold);box-shadow:0 0 5px var(--gold)}.paddle-preview{position:absolute;bottom:20px;left:36%;width:28%;height:7px;background:#fff;box-shadow:0 0 8px var(--cyan)}
    .lumen-game .screen{background:radial-gradient(circle at 78% 20%,#fff7cf 0 7px,#ffc94d66 8px 30px,transparent 55px),linear-gradient(#252547,#0b0d1c)}.preview-moth{position:absolute;left:42%;top:45%;width:13px;height:32px;border-radius:50%;background:#584631;filter:drop-shadow(0 0 8px var(--gold))}.preview-moth:before,.preview-moth:after{content:"";position:absolute;top:4px;width:32px;height:21px;border-radius:80% 15%;background:#e7d5a5;border:2px solid #5d4b34}.preview-moth:before{right:7px;transform:rotate(18deg)}.preview-moth:after{left:7px;transform:scaleX(-1) rotate(18deg)}
    .tempest .screen{display:grid;place-items:center;background:radial-gradient(circle,#15072d 0 9%,#02030a 38%)}.tube-preview{position:relative;width:142px;height:142px;border:2px solid var(--pink);clip-path:polygon(50% 0,69% 4%,85% 15%,96% 31%,100% 50%,96% 69%,85% 85%,69% 96%,50% 100%,31% 96%,15% 85%,4% 69%,0 50%,4% 31%,15% 15%,31% 4%);background:repeating-conic-gradient(from 0deg,#52efff 0 1deg,transparent 1deg 22.5deg),radial-gradient(circle,transparent 0 24%,#986cff 25% 26%,transparent 27% 47%,#ff4fa3 48% 49%,transparent 50% 72%,#52efff 73% 74%,transparent 75%);filter:drop-shadow(0 0 9px var(--cyan))}.tube-preview:before{content:"";position:absolute;inset:42%;border:2px solid var(--gold);transform:rotate(45deg)}.tube-preview:after{content:"V";position:absolute;left:45%;top:-5px;color:#fff;font:900 25px Arial;text-shadow:0 0 9px var(--cyan)}
    .mall-floor{height:22vh;min-height:130px;background:repeating-linear-gradient(90deg,#b7ada0 0 80px,#cabfb1 80px 160px);transform:perspective(500px) rotateX(55deg);transform-origin:top;box-shadow:inset 0 20px 30px #0008}
    .directory{position:absolute;left:2%;bottom:5%;z-index:4;color:#ddd8;font:11px/1.5 monospace;letter-spacing:.08em}.directory b{color:var(--gold)}
    .moth{position:absolute;z-index:5;right:9%;top:18%;width:7px;height:19px;border-radius:50%;background:#5d4b34;filter:drop-shadow(0 0 7px var(--gold));animation:flit 4s ease-in-out infinite alternate}.moth:before,.moth:after{content:"";position:absolute;top:2px;width:17px;height:12px;border-radius:80% 12%;background:#dec98c;border:1px solid #4f402b}.moth:before{right:4px;transform:rotate(22deg)}.moth:after{left:4px;transform:scaleX(-1) rotate(22deg)}@keyframes flit{to{transform:translate(-35px,20px) rotate(18deg)}}
    .staff-door{position:absolute;z-index:6;right:1.2%;top:76px;width:72px;height:134px;border:5px solid #070609;border-radius:3px 3px 0 0;background:linear-gradient(90deg,#1a1012,#382225 48%,#160d10);box-shadow:inset 0 0 18px #000,0 12px 18px #000b;text-decoration:none;transition:filter .2s,transform .2s;transform-origin:bottom right}.staff-door:before{content:"";position:absolute;right:9px;top:64px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}.staff-door span{position:absolute;left:7px;right:7px;top:20px;padding:5px 2px;border:1px solid #b99445;background:#17110b;color:#f1d783;text-align:center;font:700 8px/1.25 monospace;letter-spacing:.08em;box-shadow:0 0 7px #d3a63455}.staff-door:hover,.staff-door:focus{filter:brightness(1.35);transform:translateY(-2px);outline:1px solid var(--gold);outline-offset:4px}
    @media(max-width:750px){.mall{padding-inline:1vw}.store{width:100%;border-width:5px}.fascia{min-height:100px}.entrance{padding-inline:12px;min-height:1280px}.machines{grid-template-columns:repeat(2,minmax(0,1fr));gap:38px 12px;padding-inline:0}.machine,.machine:nth-child(1),.machine:nth-child(3),.machine:nth-child(4),.machine:nth-child(6){grid-column:auto;height:350px;transform:none}.screen{height:190px}.deck{gap:8px}.directory{display:none}.sign small{letter-spacing:.25em}.staff-door{right:6px;top:42px;transform:scale(.8);transform-origin:top right}.staff-door:hover,.staff-door:focus{transform:scale(.8) translateY(-2px)}}
    @media(max-width:430px){.entrance{min-height:1180px}.machine,.machine:nth-child(1),.machine:nth-child(3),.machine:nth-child(4),.machine:nth-child(6){height:315px;padding:14px 7px}.screen{height:166px}.cab-sign{font-size:15px}.machines{gap:30px 7px}.deck{height:43px}.moth{display:none}.staff-door{top:28px;transform:scale(.66)}.staff-door:hover,.staff-door:focus{transform:scale(.66) translateY(-2px)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="mall">
    <div class="ceiling"></div><i class="light l1"></i><i class="light l2"></i><i class="light l3"></i>
    <section class="store">
      <header class="fascia"><h1 class="sign">ASTER'S ARCADE<small>OPEN LATE | TOKENS NEVER EXPIRE</small></h1></header>
      <div class="entrance">
        <div class="carpet"></div><div class="moth" title="Lumen is inspecting the sign"></div>
        <a class="staff-door" href="room.html" aria-label="Visit Aster's room"><span>STAFF<br>ONLY</span></a>
        <nav class="machines" aria-label="Arcade games">
          <a class="machine neon" href="tetris.html" aria-label="Play Neontris">
            <div class="cab-sign">NEONTRIS</div><div class="screen"><div class="blocks" id="blocks"></div></div>
            <div class="deck"><i class="stick"></i><i class="button"></i><i class="button"></i></div>
          </a>
          <a class="machine science" href="science.html" aria-label="Play Science">
            <div class="cab-sign">SCIENCE</div><div class="screen"><div><strong>THIS PROJECT<br>HAS ALREADY FAILED.</strong><br>INSERT TOKEN<br>TO LEARN WHY</div></div>
            <div class="deck"><i class="stick"></i><i class="button"></i><i class="button"></i></div>
          </a>
          <a class="machine star" href="star-drift.html" aria-label="Play Star Drift">
            <div class="cab-sign">STAR DRIFT</div><div class="screen"><i class="ship"></i><i class="rock r1"></i><i class="rock r2"></i></div>
            <div class="deck"><i class="stick"></i><i class="button"></i><i class="button"></i></div>
          </a>
          <a class="machine breaker" href="neon-breaker.html" aria-label="Play Neon Breaker">
            <div class="cab-sign">NEON BREAKER</div><div class="screen"><div class="brick-wall" id="brickWall"></div><i class="paddle-preview"></i></div>
            <div class="deck"><i class="stick"></i><i class="button"></i><i class="button"></i></div>
          </a>
          <a class="machine lumen-game" href="lumen-flight.html" aria-label="Play Lumen Flight">
            <div class="cab-sign">LUMEN FLIGHT</div><div class="screen"><i class="preview-moth"></i></div>
            <div class="deck"><i class="stick"></i><i class="button"></i><i class="button"></i></div>
          </a>
          <a class="machine tempest" href="tempest.html" aria-label="Play Tempest">
            <div class="cab-sign">TEMPEST</div><div class="screen"><i class="tube-preview"></i></div>
            <div class="deck"><i class="stick"></i><i class="button"></i><i class="button"></i></div>
          </a>
        </nav>
      </div>
    </section>
    <div class="directory"><b>YOU ARE HERE</b><br>ASTER'S ARCADE<br>UPPER LEVEL | UNIT 32</div>
    <div class="mall-floor"></div>
  </main>
  <script>
    const blocks=document.getElementById('blocks');
    for(let i=0;i<96;i++)blocks.appendChild(document.createElement('i'));
    const brickWall=document.getElementById('brickWall');
    for(let i=0;i<35;i++)brickWall.appendChild(document.createElement('i'));
  </script>
</body>
</html>
